<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link type="Image/x-icon" href="./img/todo-logo.svg" rel="icon">
    <link rel="stylesheet" href="./css/main.css">
</head>

<body>
    <header>
        <div class="header container">
            <img src="./img/todo-logo.svg" alt="logo" class="logo">
            <h1>ToDo</h1>
        </div>
    </header>
    <main>
        <section>
            <div class="greeting">
                <p>Hello, Start planning today</p>
            </div>
        </section>

        <section>
            <div class="wrapper">

                <section class="stats date">
                    <div class="date">
                        <h1 id="dateToday">30-01-2026</h1>
                    </div>
                </section>

                <section class="stats status__container">
                </section>

                <section class="new_task">
                    <div class="new_task__container">
                        <form id="form">
                            <input type="text" id='taskTitle' placeholder="Enter task title*" maxlength=50">
                            <input type="text" id='taskDetails' placeholder="Enter task details*" maxlength="120">
                            <div class="priority__container">
                                <select name="priority--add" id="priority--add">
                                    <option value="Low">Choose priority</option>
                                    <option value="High">High</option>
                                    <option value="Medium">Medium</option>
                                    <option value="Low">Low</option>
                                </select>
                            </div>
                            <button type='submit' id="submit">+</button>
                        </form>

                    </div>
                </section>

                <!-- Sorting -->
                <section class="sorting">
                    <div class="sorting__container">
                        <select name="priority--find" id="priority--find" onchange="sortItems()">
                            <option value="By priority">By priority</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <form id="form-find">
                            <div class="sorting__find_field">
                                <input type="text" name = 'findByTitle' placeholder="Find by title">
                                <button type="submit" data-action="search">
                                    <img src="./img/magnifying-glass.svg" alt="magnifying-glass" width="25">
                                </button>
                            </div>
                        </form>
                    </div>
                </section>
                <!-- Sorting -->

                <!-- List of tasks -->
                <section class="tasks">
                    <div class="tasks__container">
                        <ul id="tasksList" class="list-group list-group-flush">
                            <!-- <li id="emptyList" class="list-group-item empty_list">
                                <img src="./img/todo-empty-com.svg" alt="Empty" width="48" class="mt-3">
                                <div class="empty_list__title">List is empty</div>
                            </li> -->

                            <!-- <li class="task__item"> 
                                <div class="task__text">
                                    <span class="task__title">Learn Javascipt</span>
                                    <p class="task__details">Master the language powering the modern web.</p>
                                    <p class="task__priority">High</p>
                                    <p class="task__date">Start date: 01.01.2026</p>
                                </div>
                                 <div class="task__item__buttons">
                                    <button type="button" data-action="done" class="btn-action">
                                        <img src="./img/icons/done.svg" alt="Done" width="18" height="18">
                                    </button>
                                    <button type="button" data-action="delete" class="btn-action">
                                        <img src="./img/icons/delete.svg" alt="Delete" width="18" height="18">
                                    </button>
                                </div> 
                            </li> -->
                        </ul>
                    </div>
                </section>
                <!-- List of tasks -->

                <section class="load">
                    <div class="load__container">
                        <div id="pagination" class="pagination__container"></div>
                        <!-- <button>Load more</button> -->
                    </div>
                </section>
            </div>
        </section>

    </main>
    <footer>
        <div class="copyright">
            <p>&copy; 2026 ToDo App. All rights reserved.</p>
        </div>
    </footer>

    <script src="./js/main.js" defer></script>
</body>

</html>
