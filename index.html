<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo</title>
    <link type="Image/x-icon" href="./img/todo-logo.svg" rel="icon">
    <link rel="stylesheet" href="./css/main.css">  
</head>
<body>
    <header>
        <div class="header-container">
            <img src="./img/todo-logo.svg" alt="logo" class="logo"><h1>ToDo</h1>
        </div>
    </header>
    <main>
        <section>
            <div class="greeting-container">
                <p>Hello, User, Start planning today</p>
            </div>
        </section>

        <section> 
            <div class="wrapper">

                <section class="stats date">
                    <div class="stats__container date">
                        <h1 id="dateToday">30-01-2026</h1>
                    </div>
                </section>

                <section class="stats stats--done">
                    <div class="stats__container">
                        <h1>completed tasks</h1>
                        <p>04</p>
                    </div>
                </section>

                <section class="stats stats--pending">
                    <div class="stats__container">
                        <h1>pending tasks</h1>
                        <p>15</p>
                    </div>
                </section>

                <section class="stats stats--created">
                    <div class="stats__container">
                        <h1>created tasks</h1>
                        <p>19</p>
                    </div>
                </section>

                <section class="new-task">
                    <div class="new-task-container">
                        <form id="form">
                            <input type="text" id='taskTitle' placeholder="Enter task title">
                            <input type="text" id='taskDetails' placeholder="Enter task details">
                            <div class="priority-container">
                                    <select name="priority" id="priority">
                                        <option value="Low">Choose priority</option>
                                        <option value="High">High</option>
                                        <option value="Medium">Medium</option>
                                        <option value="Low">Low</option>
                                    </select>
                                </div>
                                <button id="submit">+</button>
                        </form>
                        
                    </div>
                </section>

                <!-- Sorting -->
                <section class="sorting">
                    <div class="sorting-container">
                        <select name="priority" id="priority">
                            <option value="Low">By priority</option>
                            <option value="High">High</option>
                            <option value="Medium">Medium</option>
                            <option value="Low">Low</option>
                        </select>
                        <div class="sorting-find-field">
                            <input type="text" placeholder="Find by title">
                            <button type="button" data-action="search">
                                <img src="./img/magnifying-glass.svg" alt="magnifying-glass" width="25">
                            </button>
                        </div>
                    </div>
                </section>
                <!-- Sorting -->

                <!-- List of tasks -->
                <section class="tasks">
                    <div class="tasks-container">
                        <ul id="tasksList" class="list-group list-group-flush">
                            <li id="emptyList" class="list-group-item empty-list">
                                <img src="./img/todo-empty-com.svg" alt="Empty" width="48" class="mt-3">
                                <div class="empty-list__title">List is empty</div>
                            </li>
                            
                            <!-- <li class="task-item"> 
                                <div class="task-text">
                                    <span class="task-title">Learn Javascipt</span>
                                    <p class="task-details">Master the language powering the modern web.</p>
                                    <p class="task-priority">High</p>
                                    <p class="task-date">Start date: 01.01.2026</p>
                                </div>
                                 <div class="task-item__buttons">
                                    <button type="button" data-action="done" class="btn-action">
                                        <img src="./img/icons/done.svg" alt="Done" width="18" height="18">
                                    </button>
                                     <button type="button" data-action="edit" class="btn-action">
                                        <img src="./img/icons/edit.svg" alt="Edit" width="18" height="18">
                                    </button>
                                    <button type="button" data-action="delete" class="btn-action">
                                        <img src="./img/icons/delete.svg" alt="Delete" width="18" height="18">
                                    </button>
                                </div> 
                            </li> -->
                        </ul>
                    </div>
                </section>
                <!-- List of tasks -->

                <section class="load">
                    <div class="load-container">
                        <button>Load more</button>
                    </div>
                </section>
            </div>
        </section>

    </main>
    <footer>
        <div class="copyright">
            <p>&copy; 2026 ToDo App. All rights reserved.</p>
        </div>
    </footer>

    <script src="./js/main.js" defer></script>
</body>
</html>
